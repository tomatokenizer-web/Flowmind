version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: flowmind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowmind
      POSTGRES_PASSWORD: flowmind
      POSTGRES_DB: flowmind
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
